<!DOCTYPE html>
<html>
<head>
  <title>CraftyCraze</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6bd6, #7c3aed, #0ea5e9);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      max-width: 600px;
      margin: auto;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 15px;
      font-weight: bold;
    }

    .section {
      background: white;
      color: black;
      padding: 60px 20px;
    }

    .card {
      background: #f2f2f2;
      margin: 15px;
      padding: 25px;
      border-radius: 20px;
      display: inline-block;
      width: 220px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>CraftyCraze</h1>
    <p>Handmade crafts, custom gifts, and cute decor made with love.</p>
    <a href="#contact" class="button">Order Custom</a>
  </div>

  <div class="section">
    <h2>Featured</h2>
    <div class="card">Custom Gifts</div>
    <div class="card">Room Decor</div>
    <div class="card">Party Favors</div>
  </div>

  <div class="section" id="contact">
    <h2>Contact</h2>
    <p>Email: craftycraze@example.com</p>
    <p>Instagram: @craftycraze</p>
  </div>

</body>
</html>
